name: Publish Article

on:
  issues:
    types: [closed]

# Only run when the closed issue has the "needs-review" label
# (prevents firing on every unrelated issue close)

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'needs-review')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Publish approved draft
        run: python -m pipelines.publish
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
